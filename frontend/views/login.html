<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCompare - Enterprise Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f3f6fa;
            --surface: #ffffff;
            --text: #0b1e33;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --primary: #0b1e33;
            --primary-hover: #1e293b;
            --gold: #d4a843;
            --gold-light: #e8d5a3;
            --gold-bg: rgba(212, 168, 67, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px -5px rgba(0, 0, 0, 0.1);
            --radius-lg: 24px;
            --radius-md: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 100% 0%, rgba(212, 168, 67, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 0% 100%, rgba(11, 30, 51, 0.05) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .brand .logo span {
            color: var(--gold);
        }

        .brand .logo i {
            color: var(--gold);
            font-size: 1.8rem;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--gold));
        }

        h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: #fafafa;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--surface);
            box-shadow: 0 0 0 4px var(--gold-bg);
        }

        .input-wrapper input:focus + i {
            color: var(--gold);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .options input[type="checkbox"] {
            accent-color: var(--gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .options a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .options a:hover {
            color: var(--gold);
        }

        button.btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button.btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(11, 30, 51, 0.15);
        }

        button.btn-submit:active {
            transform: translateY(0);
        }

        .error-banner {
            display: none;
            background: var(--red-bg);
            color: var(--red);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }
        
        .footer a:hover {
            color: var(--text);
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand">
            <div class="logo">
                <i class="fa-solid fa-chart-pie"></i>
                Fin<span>Compare</span>
            </div>
            <p>Enterprise Admin Portal</p>
        </div>

        <div class="login-card">
            <h2>Welcome Back</h2>
            
            <div id="error-msg" class="error-banner" style="display: none;">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Invalid username or password.</span>
            </div>

            <form id="login-form" onsubmit="event.preventDefault(); login();">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <div class="footer">
            &copy; 2026 FinCompare Inc. All rights reserved.<br>
            <a href="#">Privacy Policy</a> &bull; <a href="#">Terms of Service</a>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorBanner = document.getElementById('error-msg');
            
            errorBanner.style.display = 'none';

            // Brief simulated loading delay for better UX
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;

            setTimeout(() => {
                if(u === 'admin' && p === 'password') {
                    localStorage.setItem('auth_token', 'logged_in_valid_token');
                    window.location.href = '/dashboard';
                } else {
                    errorBanner.style.display = 'flex';
                    // Trigger reflow to restart animation
                    errorBanner.style.animation = 'none';
                    errorBanner.offsetHeight; 
                    errorBanner.style.animation = 'shake 0.4s ease-in-out';
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }, 600);
        }
    </script>
</body>
</html>
