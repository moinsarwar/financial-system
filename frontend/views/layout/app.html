<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCompare Dashboard</title>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --bg: #f3f6fa;
            --surface: #ffffff;
            --text: #0b1e33;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --primary: #0b1e33;
            --primary-hover: #1e293b;
            --gold: #d4a843;
            --gold-light: #e8d5a3;
            --gold-bg: rgba(212, 168, 67, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --radius-lg: 16px;
            --radius-md: 8px;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header i {
            color: var(--gold);
            font-size: 1.8rem;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
        }

        .sidebar-header h2 span {
            color: var(--gold);
        }

        .nav-links {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.25rem;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .nav-link i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-link.active {
            background-color: var(--gold-bg);
            color: var(--gold);
            font-weight: 600;
        }

        .nav-link.logout {
            margin-top: auto;
            color: #fca5a5;
            background-color: rgba(239, 68, 68, 0.1);
        }
        .nav-link.logout:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: white;
        }
        
        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background-image: radial-gradient(circle at 100% 0%, rgba(212, 168, 67, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h2.title {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* ===== FORMS ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--gold-bg);
        }
        
        /* ===== BUTTONS ===== */
        .submit-btn {
            background-color: var(--primary);
            color: white;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(11, 30, 51, 0.15);
        }
        
        .add-btn {
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .add-btn:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }
        
        /* ===== DYNAMIC ROWS ===== */
        .dynamic-section {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border);
            margin-top: 0.5rem;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .row input {
            flex: 1;
        }
        
        .remove-btn {
            background-color: white;
            color: var(--red);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            border-color: var(--red);
            background-color: var(--red-bg);
        }
        
        /* ===== DATATABLES OVERRIDES ===== */
        table.dataTable {
            border-collapse: collapse !important;
            width: 100% !important;
            margin-top: 1.5rem !important;
            border-bottom: 1px solid var(--border) !important;
        }

        table.dataTable thead th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem !important;
            border-bottom: 2px solid var(--border) !important;
        }

        table.dataTable tbody td {
            padding: 1rem !important;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text);
        }

        table.dataTable tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .action-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            background: white;
            transition: all 0.2s;
        }

        .btn-edit {
            color: var(--primary);
        }
        .btn-edit:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .btn-delete {
            color: var(--red);
        }
        .btn-delete:hover {
            border-color: var(--red);
            background-color: var(--red-bg);
        }

        .status-pill {
            background: var(--green-bg);
            color: var(--green);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dataTables_wrapper .dataTables_filter input {
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
        }
        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .dataTables_wrapper .dataTables_length select {
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.4rem;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current, 
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            border-radius: var(--radius-md) !important;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            color: white;
            display: none;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="app-sidebar">
        <!-- Sidebar loads here -->
    </div>

    <div class="main-content" id="app-content">
        <!-- Content loads here -->
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" style="display: none;">
        <i class="fa-solid fa-circle-info" id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        if(localStorage.getItem('auth_token') !== 'logged_in_valid_token') {
            window.location.href = '/login';
        }

        window.productsData = [];

        async function loadFragment(url, containerId) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Failed to load fragment');
                const html = await res.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (e) {
                console.error("Error loading fragment:", e);
                showToast("Error loading view", true);
            }
        }

        async function initApp() {
            await loadFragment('/layout/sidebar.html', 'app-sidebar');
            route();
        }

        async function route() {
            const path = window.location.pathname;
            if (path.startsWith('/dashboard/product/edit/')) {
                const id = path.split('/').pop();
                await loadFragment('/product/edit.html', 'app-content');
                await fetchProducts(false, false); 
                editProduct(id, false);
            } else if (path === '/dashboard/product/new') {
                await loadFragment('/product/create.html', 'app-content');
                document.getElementById('productForm').reset();
                document.getElementById('edit_product_id').value = '';
                document.getElementById('last_updated').value = new Date().toISOString().slice(0, 16);
                updateSidebarNav('list');
            } else if (path === '/dashboard/product') {
                await loadFragment('/product/list.html', 'app-content');
                updateSidebarNav('list');
                fetchProducts(false, true);
            } else {
                // Default to overview dashboard
                await loadFragment('/dashboard/index.html', 'app-content');
                updateSidebarNav('home');
                fetchProducts(true, false);
            }
        }

        function routeTo(path) {
            history.pushState(null, '', path);
            route();
        }

        window.onpopstate = () => route();

        function updateSidebarNav(view) {
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(view === 'home' && document.getElementById('nav-home')) document.getElementById('nav-home').classList.add('active');
            if(view === 'list' && document.getElementById('nav-list')) document.getElementById('nav-list').classList.add('active');
        }

        function logout() {
            localStorage.removeItem('auth_token');
            window.location.href = '/login';
        }

        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.textContent = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toastIcon.className = isError ? 'fa-solid fa-circle-exclamation' : 'fa-solid fa-circle-check';
            
            toast.style.display = 'none';
            toast.offsetHeight; // reflow
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function addPricingRow(key='', val='') {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<input type="text" placeholder="Key" class="price-key" value="${key}"><input type="text" placeholder="Value" class="price-value" value="${val}"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('pricing-rows').appendChild(row);
        }
        function addFeatureRow(name='', details='') {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<input type="text" placeholder="Feature Name" class="feat-name" value="${name}"><input type="text" placeholder="Feature Details" class="feat-details" value="${details}"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('features-rows').appendChild(row);
        }
        function removeRow(btn) {
            btn.parentElement.remove();
        }

        async function fetchProducts(onlyCount = false, renderTable = true) {
            try {
                const res = await fetch('/products/all');
                const data = await res.json();
                
                if(!data.products) data.products = [];
                window.productsData = data.products;
                
                // Update total count
                const countEl = document.getElementById('total-products-count');
                if(countEl) countEl.innerText = data.products.length;

                const ccCountEl = document.getElementById('cc-products-count');
                const hiCountEl = document.getElementById('hi-products-count');
                const svCountEl = document.getElementById('sv-products-count');

                if (ccCountEl || hiCountEl || svCountEl) {
                    let cc = 0, hi = 0, sv = 0;
                    data.products.forEach(p => {
                        const t = (p.product_type || '').toLowerCase();
                        if(t.includes('credit') || t.includes('card')) cc++;
                        if(t.includes('health') || t.includes('insurance') || t.includes('medical')) hi++;
                        if(t.includes('saving') || t.includes('deposit') || t.includes('bank')) sv++;
                    });
                    if(ccCountEl) ccCountEl.innerText = cc;
                    if(hiCountEl) hiCountEl.innerText = hi;
                    if(svCountEl) svCountEl.innerText = sv;
                }

                if (onlyCount || !renderTable) return;
                
                if ($.fn.DataTable.isDataTable('#productsTable')) {
                    $('#productsTable').DataTable().destroy();
                }

                const tbody = document.getElementById('products-tbody');
                if (!tbody) return;

                tbody.innerHTML = '';
                
                if(data.products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem !important; color:#64748b;">No products found in registry.</td></tr>';
                    return;
                }
                
                data.products.forEach(p => {
                    const tr = document.createElement('tr');
                    const statusClass = p.status.toLowerCase() === 'active' ? 'status-pill' : 'status-pill" style="background:rgba(239, 68, 68, 0.1); color:#ef4444;';
                    
                    tr.innerHTML = `
                        <td><strong>${p.product_id}</strong></td>
                        <td>${p.provider_id}</td>
                        <td>${p.product_type}</td>
                        <td><span class="${statusClass}">${p.status}</span></td>
                        <td>${new Date(p.last_updated).toLocaleString()}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="routeTo('/dashboard/product/edit/${p.product_id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="action-btn btn-delete" onclick="deleteProduct('${p.product_id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                $('#productsTable').DataTable({
                    "pageLength": 10,
                    "ordering": true,
                    "searching": true,
                    "responsive": true,
                    "language": {
                        "search": "<i class='fa-solid fa-search' style='color:#94a3b8; margin-right:4px;'></i> Search:"
                    }
                });
            } catch(e) {
                showToast("Failed to load products from server", true);
            }
        }

        function editProduct(productId) {
            const p = window.productsData.find(x => x.product_id === productId);
            if(!p) {
                showToast("Product not found!", true);
                routeTo('/dashboard/product');
                return;
            }

            updateSidebarNav('list');
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Edit Product: ' + productId;
            document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-save"></i> Update Product';
            document.getElementById('edit_product_id').value = productId;

            document.getElementById('provider_id').value = p.provider_id || '';
            document.getElementById('product_type').value = p.product_type || '';
            document.getElementById('status').value = p.status || 'active';
            document.getElementById('version').value = p.version || '1';
            document.getElementById('schema_hash').value = p.schema_hash || 'sha256:abc1234567890abcdef';
            document.getElementById('jurisdiction').value = p.jurisdiction ? JSON.stringify(p.jurisdiction) : '["PK"]';
            if(p.last_updated) document.getElementById('last_updated').value = p.last_updated.slice(0, 16);
            if(p.compliance) document.getElementById('sharia_certified').value = p.compliance.sharia_certified ? "true" : "false";
            
            document.getElementById('minAge').value = p.eligibility_rules?.minAge || '';
            document.getElementById('maxAge').value = p.eligibility_rules?.maxAge || '';
            document.getElementById('effective_date').value = p.effective_date ? p.effective_date.substring(0, 10) : '';
            document.getElementById('published_by').value = p.published_by || 'System Admin';
            document.getElementById('approved_by').value = p.approved_by || 'Compliance Team';
            document.getElementById('change_request').value = p.change_request || 'CR-1001';
            document.getElementById('previous_version').value = p.previous_version || 'v0.9';

            document.getElementById('pricing-rows').innerHTML = '';
            if(p.pricing) {
                Object.entries(p.pricing).forEach(([k,v]) => addPricingRow(k, v));
            }
            if(document.getElementById('pricing-rows').children.length === 0) addPricingRow();

            document.getElementById('features-rows').innerHTML = '';
            if(p.features) {
                p.features.forEach(f => addFeatureRow(f.name, f.details));
            }
            if(document.getElementById('features-rows').children.length === 0) addFeatureRow();
        }

        async function deleteProduct(productId) {
            if(!confirm(`Are you sure you want to completely delete ${productId}?`)) return;
            try {
                const res = await fetch(`/products/${productId}`, { method: 'DELETE' });
                if(res.ok) {
                    showToast("Product deleted successfully", false);
                    fetchProducts(false, true);
                } else {
                    showToast("Failed to delete product", true);
                }
            } catch(e) {
                showToast("Network error during deletion", true);
            }
        }

        async function submitProduct(e) {
            e.preventDefault();
            
            let pricing = {};
            document.querySelectorAll('#pricing-rows .row').forEach(row => {
                const k = row.querySelector('.price-key').value.trim();
                const v = row.querySelector('.price-value').value.trim();
                if(k && v) {
                    pricing[k] = isNaN(v) ? v : Number(v);
                }
            });

            let features = [];
            document.querySelectorAll('#features-rows .row').forEach(row => {
                const n = row.querySelector('.feat-name').value.trim();
                const d = row.querySelector('.feat-details').value.trim();
                if(n || d) {
                    features.push({name: n, details: d});
                }
            });
            
            let jurisdiction = ["PK"];
            try {
                if(document.getElementById('jurisdiction').value.trim()) jurisdiction = JSON.parse(document.getElementById('jurisdiction').value);
            } catch(err) {
                showToast("Invalid JSON format in Jurisdiction!", true);
                return;
            }

            const productObj = {
                product_type: document.getElementById('product_type').value,
                jurisdiction: jurisdiction,
                status: document.getElementById('status').value,
                version: document.getElementById('version').value,
                last_updated: new Date(document.getElementById('last_updated').value).toISOString(),
                pricing: pricing,
                eligibility_rules: {
                    minAge: parseInt(document.getElementById('minAge').value) || 0,
                    maxAge: parseInt(document.getElementById('maxAge').value) || 99
                },
                features: features,
                compliance: {"sharia_certified": document.getElementById('sharia_certified').value === 'true'},
                effective_date: document.getElementById('effective_date').value || undefined,
                published_by: document.getElementById('published_by').value || undefined,
                approved_by: document.getElementById('approved_by').value || undefined,
                change_request: document.getElementById('change_request').value || undefined,
                previous_version: document.getElementById('previous_version').value || undefined
            };

            const editId = document.getElementById('edit_product_id').value;
            if(editId) {
                productObj.product_id = editId;
                productObj.provider_id = document.getElementById('provider_id').value;
                
                const submitBtn = document.getElementById('submit-btn');
                const originalHtml = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

                try {
                    const res = await fetch(`/products/${editId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productObj)
                    });
                    
                    if(res.ok) {
                        showToast("Product updated successfully!", false);
                        routeTo('/dashboard/product');
                    } else {
                        const errText = await res.text();
                        showToast("Failed to process product: " + errText, true);
                    }
                } catch(err) {
                    showToast("Network error occurred.", true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalHtml;
                }
            } else {
                const payload = {
                    provider_id: document.getElementById('provider_id').value,
                    schema_hash: document.getElementById('schema_hash').value,
                    products: [productObj]
                };

                const submitBtn = document.getElementById('submit-btn');
                const originalHtml = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

                try {
                    const res = await fetch('/provider/ingest', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if(res.ok) {
                        showToast("Product successfully ingested!", false);
                        routeTo('/dashboard/product');
                    } else {
                        const errText = await res.text();
                        showToast("Failed to process product: " + errText, true);
                    }
                } catch(err) {
                    showToast("Network error occurred.", true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalHtml;
                }
            }
        }

        // Boot
        initApp();
    </script>
</body>
</html>
