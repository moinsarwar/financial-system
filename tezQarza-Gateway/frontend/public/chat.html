<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Qwen Assistant · Production</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f6fb;
      --text: #172033;
      --muted: #5b677b;
      --line: #e3e8f2;
      --brand: #1a237e;
      --brand-soft: #eef2ff;
      --user-msg: #1a237e;
      --assistant-bg: #f1f5f9;
      --success: #0f766e;
      --error: #b91c1c;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 16px 32px rgba(15, 23, 42, 0.12);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at 0% 0%, rgba(26, 35, 126, 0.06), transparent 70%),
                  linear-gradient(145deg, #fafcff, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
      border-right: 1px solid var(--line);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1a237e, #283593);
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1.5rem;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .brand h1 {
      font-size: 1.1rem;
      letter-spacing: -0.2px;
    }

    .brand p {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .new-chat-btn {
      background: var(--brand);
      border: none;
      color: white;
      font-weight: 700;
      padding: 12px;
      border-radius: 14px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
      margin: 8px 0 4px 0;
      box-shadow: 0 6px 14px rgba(26, 35, 126, 0.25);
    }

    .new-chat-btn:hover {
      background: #0f195f;
      transform: translateY(-1px);
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      margin: 16px 0 8px 0;
    }

    .chat-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 280px;
      overflow-y: auto;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.1s;
      color: #2c3e66;
    }

    .chat-item.active {
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 600;
    }

    .chat-item:hover {
      background: #e9edf5;
    }

    .delete-chat {
      opacity: 0;
      background: transparent;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: #8f9bb3;
      border-radius: 30px;
      width: 26px;
      height: 26px;
    }

    .chat-item:hover .delete-chat {
      opacity: 1;
    }

    .config-panel {
      background: rgba(255, 255, 248, 0.7);
      border-radius: 20px;
      padding: 14px;
      border: 1px solid var(--line);
      font-size: 0.75rem;
    }

    .config-panel label {
      font-weight: 600;
      display: block;
      margin: 10px 0 4px;
      color: var(--text);
    }

    .config-panel input, .config-panel select, .config-panel textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      font-size: 0.75rem;
      font-family: monospace;
    }

    .config-panel textarea {
      font-family: inherit;
      resize: vertical;
    }

    .test-connection {
      background: #eef2ff;
      border: 1px solid #cbd5e1;
      border-radius: 40px;
      padding: 6px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .status-badge-sm {
      display: inline-block;
      font-size: 0.7rem;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 20px;
    }

    .main-area {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 0 28px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
    }

    .chat-header h2 {
      font-size: 1.2rem;
    }

    .status-badge {
      background: #e6f7f5;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #0f766e;
      border-radius: 50%;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px 28px 100px 28px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      align-items: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .avatar.ai {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .avatar.user {
      background: #dbeafe;
      color: #1e3a8a;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 22px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bubble.ai {
      background: var(--assistant-bg);
      border: 1px solid var(--line);
      border-top-left-radius: 6px;
    }

    .bubble.user {
      background: var(--user-msg);
      color: white;
      border-top-right-radius: 6px;
    }

    .loading-bubble {
      background: #eef2ff;
      padding: 12px 18px;
      border-radius: 22px;
      font-size: 0.85rem;
      color: #1e293b;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 28px 12px 28px;
      max-width: 960px;
      margin-inline: auto;
    }

    .chip {
      background: white;
      border: 1px solid var(--line);
      border-radius: 40px;
      padding: 8px 15px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
    }

    .chip:hover {
      background: #eef2ff;
      border-color: #b9c3e6;
    }

    .composer-area {
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, transparent, var(--bg) 20%);
      padding: 18px 28px 26px;
    }

    .composer-card {
      max-width: 960px;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      border: 1px solid var(--line);
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 8px 12px;
      box-shadow: var(--shadow-md);
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 12px 8px;
      max-height: 130px;
    }

    .send-btn {
      background: var(--brand);
      border: none;
      color: white;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.1s;
    }

    .send-btn:disabled {
      background: #b9c3e6;
      cursor: not-allowed;
    }

    @media (max-width: 780px) {
      .app-shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .composer-area {
        padding: 12px 16px 22px;
      }
      .bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">⚡</div>
      <div>
        <h1>Qwen Assistant</h1>
        <p>production · vLLM ready</p>
      </div>
    </div>
    <button class="new-chat-btn" id="newChatBtn">+ New conversation</button>
    <button class="new-chat-btn" id="clearAllChatsBtn" style="background:#64748b; margin-top:0;">🗑️ Clear all chats</button>

    <div class="section-title">📁 Recent conversations</div>
    <div class="chat-list" id="chatListContainer"></div>

    <div class="config-panel">
      <div class="section-title" style="margin-top:0;">🔌 API CONFIGURATION</div>
      <label>Endpoint URL</label>
      <input type="text" id="apiEndpoint" placeholder="https://your-vllm-server/v1/chat/completions" value="/api/qwen-chat">
      <label>API Key (optional)</label>
      <input type="password" id="apiKey" placeholder="Bearer token or API key">
      <label>Model name</label>
      <input type="text" id="modelName" value="Qwen/Qwen2.5-7B-Instruct">
      <label>System prompt (optional)</label>
      <textarea id="systemPrompt" rows="2" placeholder="You are a helpful assistant.">You are Qwen, a helpful assistant.</textarea>
      <button class="test-connection" id="testConnectionBtn">🔌 Test connection</button>
      <div id="connectionStatus" class="status-badge-sm"></div>
    </div>
  </aside>

  <main class="main-area">
    <div class="chat-header">
      <div>
        <h2 id="currentChatTitle">General assistant</h2>
        <span style="font-size: 0.75rem; color:var(--muted)">Qwen · enterprise ready</span>
      </div>
      <div class="status-badge" id="globalStatus"><span class="dot"></span> Ready</div>
    </div>

    <div class="messages-container" id="messagesContainer"></div>

    <div class="chips-row" id="quickChipsRow">
      <div class="chip" data-prompt="Summarize a loan policy excerpt in simple terms">📄 Summarize policy</div>
      <div class="chip" data-prompt="Draft an internal note explaining why LLM is separate from credit scoring">📝 Draft separation note</div>
      <div class="chip" data-prompt="Explain the difference between LLM and deterministic rules">⚖️ LLM vs rules engine</div>
      <div class="chip" data-prompt="Write a short meeting summary for underwriters">📋 Meeting points</div>
    </div>

    <div class="composer-area">
      <div class="composer-card">
        <textarea id="messageInput" rows="1" placeholder="Ask Qwen anything ..."></textarea>
        <button class="send-btn" id="micBtn" type="button" style="background:#0f766e; margin-right:4px;">🎙️</button>
        <button class="send-btn" id="sendMessageBtn">Send →</button>
      </div>
    </div>
  </main>
</div>

<script>
  // ---------- PRODUCTION STATE ----------
  let conversations = {};
  let currentChatId = null;
  let isLoading = false;

  const messagesContainer = document.getElementById('messagesContainer');
  const chatListContainer = document.getElementById('chatListContainer');
  const currentChatTitleSpan = document.getElementById('currentChatTitle');
  const messageInput = document.getElementById('messageInput');
  const micBtn = document.getElementById('micBtn');
  const sendBtn = document.getElementById('sendMessageBtn');
  const newChatBtn = document.getElementById('newChatBtn');
  const clearAllBtn = document.getElementById('clearAllChatsBtn');
  const apiEndpointInput = document.getElementById('apiEndpoint');
  const apiKeyInput = document.getElementById('apiKey');
  const modelNameInput = document.getElementById('modelName');
  const systemPromptInput = document.getElementById('systemPrompt');
  const testConnectionBtn = document.getElementById('testConnectionBtn');
  const connectionStatusDiv = document.getElementById('connectionStatus');
  const globalStatusSpan = document.getElementById('globalStatus');

  function getStorageConversations() {
    const stored = localStorage.getItem('qwen_prod_conversations');
    if (stored) {
      try { return JSON.parse(stored); } catch(e) { return null; }
    }
    return null;
  }

  function saveConversationsToLocal() {
    localStorage.setItem('qwen_prod_conversations', JSON.stringify(conversations));
  }

  function saveSettings() {
    const settings = {
      endpoint: apiEndpointInput.value,
      apiKey: apiKeyInput.value,
      model: modelNameInput.value,
      systemPrompt: systemPromptInput.value
    };
    localStorage.setItem('qwen_prod_settings', JSON.stringify(settings));
  }

  function loadSettings() {
    const saved = localStorage.getItem('qwen_prod_settings');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.endpoint) apiEndpointInput.value = s.endpoint;
        if (s.apiKey) apiKeyInput.value = s.apiKey;
        if (s.model) modelNameInput.value = s.model;
        if (s.systemPrompt) systemPromptInput.value = s.systemPrompt;
      } catch(e) {}
    }
  }

  function generateId() {
    return Date.now() + '-' + Math.random().toString(36).substring(2, 10);
  }

  function createNewConversation(title = "New chat") {
    const id = generateId();
    const welcomeMsg = "👋 Hello — I am Qwen. How can I help you today?";
    const newConv = {
      id: id,
      title: title,
      messages: [{ role: "assistant", content: welcomeMsg }],
      updatedAt: new Date().toISOString()
    };
    conversations[id] = newConv;
    saveConversationsToLocal();
    return id;
  }

  function deleteConversation(convId, event) {
    if(event) event.stopPropagation();
    if (!conversations[convId]) return;
    const isActive = (currentChatId === convId);
    delete conversations[convId];
    saveConversationsToLocal();
    const remainingIds = Object.keys(conversations);
    if (remainingIds.length === 0) {
      const newId = createNewConversation("General Qwen");
      currentChatId = newId;
    } else if (isActive) {
      currentChatId = remainingIds[0];
    }
    renderChatList();
    if (currentChatId) loadConversationIntoUI(currentChatId);
    else loadConversationIntoUI(null);
  }

  function clearAllConversations() {
    if (confirm("⚠️ Delete ALL chat histories? This cannot be undone.")) {
      conversations = {};
      const newId = createNewConversation("General Qwen");
      currentChatId = newId;
      saveConversationsToLocal();
      renderChatList();
      loadConversationIntoUI(currentChatId);
    }
  }

  function updateConversationTitle(convId, userMessagePreview) {
    const conv = conversations[convId];
    if (!conv) return;
    if (conv.title === "New chat" || conv.title === "General Qwen" || conv.title.startsWith("New chat")) {
      let newTitle = userMessagePreview.slice(0, 32);
      if (newTitle.length < 3) newTitle = "Conversation";
      conv.title = newTitle + (newTitle.length === 32 ? "…" : "");
      saveConversationsToLocal();
      renderChatList();
      if (currentChatId === convId) currentChatTitleSpan.innerText = conv.title;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatContent(text) {
    return text.replace(/\\(.?)\\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  }

  function renderMessages(messages) {
    if (!messagesContainer) return;
    messagesContainer.innerHTML = '';
    if (!messages.length) {
      messagesContainer.innerHTML = '<div style="text-align:center; margin-top:40px;">✨ Send a message to start</div>';
      return;
    }
    messages.forEach(msg => {
      const isUser = msg.role === 'user';
      const row = document.createElement('div');
      row.className = `message-row ${isUser ? 'user' : ''}`;
      if (!isUser) {
        row.innerHTML = `
          <div class="avatar ai">AI</div>
          <div class="bubble ai">${formatContent(escapeHtml(msg.content))}</div>
        `;
      } else {
        row.innerHTML = `
          <div class="bubble user">${escapeHtml(msg.content)}</div>
          <div class="avatar user">U</div>
        `;
      }
      messagesContainer.appendChild(row);
    });
    scrollToBottom();
  }

  function scrollToBottom() {
    setTimeout(() => {
      if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, 80);
  }

  function renderChatList() {
    if (!chatListContainer) return;
    const convArray = Object.values(conversations).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    chatListContainer.innerHTML = '';
    convArray.forEach(conv => {
      const div = document.createElement('div');
      div.className = `chat-item ${currentChatId === conv.id ? 'active' : ''}`;
      div.innerHTML = `
        <span style="flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(conv.title)}</span>
        <button class="delete-chat" data-id="${conv.id}" aria-label="delete">🗑️</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-chat')) return;
        currentChatId = conv.id;
        loadConversationIntoUI(conv.id);
        renderChatList();
      });
      const delBtn = div.querySelector('.delete-chat');
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteConversation(conv.id, e);
      });
      chatListContainer.appendChild(div);
    });
    if (convArray.length === 0) {
      chatListContainer.innerHTML = '<div style="padding:8px; font-size:0.75rem;">✨ No chats. Click +New</div>';
    }
  }

  function loadConversationIntoUI(convId) {
    if (!convId || !conversations[convId]) {
      const ids = Object.keys(conversations);
      if (ids.length) convId = ids[0];
      else {
        convId = createNewConversation("General Qwen");
      }
    }
    currentChatId = convId;
    const conv = conversations[currentChatId];
    if (conv) {
      renderMessages(conv.messages);
      currentChatTitleSpan.innerText = conv.title;
    } else {
      renderMessages([]);
      currentChatTitleSpan.innerText = "Chat";
    }
    renderChatList();
  }

  function addMessageToConv(convId, role, content) {
    if (!conversations[convId]) return;
    conversations[convId].messages.push({ role, content });
    conversations[convId].updatedAt = new Date().toISOString();
    saveConversationsToLocal();
    if (currentChatId === convId) {
      renderMessages(conversations[convId].messages);
      scrollToBottom();
    }
  }

  async function callQwenAPI(messagesHistory, endpoint, apiKey, model, systemPromptText) {
    let apiMessages = [];
    if (systemPromptText && systemPromptText.trim()) {
      apiMessages.push({ role: "system", content: systemPromptText.trim() });
    }
    for (const msg of messagesHistory) {
      if (msg.role === 'system') continue;
      apiMessages.push({ role: msg.role, content: msg.content });
    }

    const headers = { 'Content-Type': 'application/json' };
    if (apiKey && apiKey.trim()) {
      headers['Authorization'] = `Bearer ${apiKey.trim()}`;
    }

    const payload = {
      model: model,
      messages: apiMessages,
      temperature: 0.7,
      max_tokens: 1500,
      stream: false
    };

    const response = await fetch(endpoint, {
      method: 'POST',
      headers: headers,
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      let errorDetail = `HTTP ${response.status}`;
      try {
        const errData = await response.json();
        errorDetail = errData.error?.message || JSON.stringify(errData);
      } catch(e) {}
      throw new Error(`API error: ${errorDetail}`);
    }
    const data = await response.json();
    if (data.choices && data.choices[0] && data.choices[0].message) {
      return data.choices[0].message.content;
    }
    throw new Error("Invalid response format from API");
  }

  async function testConnection() {
    const endpoint = apiEndpointInput.value.trim();
    if (!endpoint) {
      connectionStatusDiv.innerHTML = '❌ Please enter endpoint URL';
      return;
    }
    connectionStatusDiv.innerHTML = '⏳ Testing...';
    try {
      const testMsg = [{ role: "user", content: "Reply with just 'OK' if you receive this." }];
      const response = await callQwenAPI(testMsg, endpoint, apiKeyInput.value, modelNameInput.value, systemPromptInput.value);
      if (response) {
        connectionStatusDiv.innerHTML = '✅ Connection successful!';
        globalStatusSpan.innerHTML = '<span class="dot"></span> Online';
      } else {
        connectionStatusDiv.innerHTML = '⚠️ Unexpected empty response';
      }
    } catch (err) {
      connectionStatusDiv.innerHTML = `❌ Failed: ${err.message.slice(0, 80)}`;
      globalStatusSpan.innerHTML = '<span class="dot" style="background:#b91c1c;"></span> API error';
    }
  }

  async function sendMessage(userText) {
    if (!userText || userText.trim() === "") return;
    if (isLoading) {
      alert("Please wait, AI is responding...");
      return;
    }
    if (!currentChatId || !conversations[currentChatId]) {
      const newId = createNewConversation("New chat");
      currentChatId = newId;
      loadConversationIntoUI(currentChatId);
    }

    addMessageToConv(currentChatId, "user", userText.trim());
    const conv = conversations[currentChatId];
    const userMsgCount = conv.messages.filter(m => m.role === 'user').length;
    if (userMsgCount === 1) {
      updateConversationTitle(currentChatId, userText.trim());
      renderChatList();
      currentChatTitleSpan.innerText = conversations[currentChatId].title;
    }

    isLoading = true;
    sendBtn.disabled = true;
    const tempId = "loading-" + Date.now();
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message-row';
    loadingDiv.id = tempId;
    loadingDiv.innerHTML = `<div class="avatar ai">AI</div><div class="loading-bubble">✍️ Qwen is generating <span>···</span></div>`;
    messagesContainer.appendChild(loadingDiv);
    scrollToBottom();

    const endpoint = apiEndpointInput.value.trim();
    const apiKey = apiKeyInput.value;
    const model = modelNameInput.value.trim() || "Qwen/Qwen2.5-7B-Instruct";
    const systemPrompt = systemPromptInput.value;

    if (!endpoint) {
      const errorMsg = "❌ API endpoint missing. Please configure URL in sidebar.";
      document.getElementById(tempId)?.remove();
      addMessageToConv(currentChatId, "assistant", errorMsg);
      isLoading = false;
      sendBtn.disabled = false;
      return;
    }

    try {
      const assistantReply = await callQwenAPI(conv.messages, endpoint, apiKey, model, systemPrompt);
      const loadingEl = document.getElementById(tempId);
      if (loadingEl) loadingEl.remove();
      addMessageToConv(currentChatId, "assistant", assistantReply);
      speak(assistantReply);
      globalStatusSpan.innerHTML = '<span class="dot"></span> Online';
    } catch (err) {
      const loadingEl = document.getElementById(tempId);
      if (loadingEl) loadingEl.remove();
      const errorMsg = `⚠️ API Error: ${err.message}`;
      addMessageToConv(currentChatId, "assistant", errorMsg);
      globalStatusSpan.innerHTML = '<span class="dot" style="background:#b91c1c;"></span> Error';
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      messageInput.value = "";
      messageInput.style.height = "auto";
      messageInput.focus();
      saveSettings();
    }
  }

  function setupEventListeners() {
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (text && !isLoading) sendMessage(text);
    });
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text && !isLoading) sendMessage(text);
      }
    });
    newChatBtn.addEventListener('click', () => {
      const newId = createNewConversation("New chat");
      currentChatId = newId;
      loadConversationIntoUI(currentChatId);
      renderChatList();
      scrollToBottom();
    });
    clearAllBtn.addEventListener('click', clearAllConversations);
    testConnectionBtn.addEventListener('click', testConnection);

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const prompt = chip.getAttribute('data-prompt');
        if (prompt) {
          messageInput.value = prompt;
          messageInput.focus();
          setTimeout(() => {
            if (messageInput.value.trim() && !isLoading) sendMessage(messageInput.value.trim());
          }, 100);
        }
      });
    });

    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(130, this.scrollHeight) + 'px';
    });

    apiEndpointInput.addEventListener('change', saveSettings);
    apiKeyInput.addEventListener('change', saveSettings);
    modelNameInput.addEventListener('change', saveSettings);
    systemPromptInput.addEventListener('change', saveSettings);
  }

  function init() {
    loadSettings();
    const stored = getStorageConversations();
    if (stored && Object.keys(stored).length > 0) {
      conversations = stored;
      const ids = Object.keys(conversations);
      if (ids.length) currentChatId = ids[0];
      else currentChatId = createNewConversation("General Qwen");
    } else {
      const defaultId = createNewConversation("General Qwen");
      currentChatId = defaultId;
    }
    saveConversationsToLocal();
    renderChatList();
    loadConversationIntoUI(currentChatId);
    setupEventListeners();
  }

  let muted = false;
  let recognition = null;
  let isRecording = false;

  function speak(text) {
    if (muted || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    window.speechSynthesis.speak(utterance);
  }

  function setupSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      if (micBtn) {
        micBtn.disabled = true;
        micBtn.textContent = "🎙️ Not supported";
      }
      return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = true;
    recognition.continuous = false;

    let finalTranscript = "";

    recognition.onstart = () => {
      isRecording = true;
      finalTranscript = "";
      micBtn.style.background = "#b91c1c";
      micBtn.textContent = "●";
    };

    recognition.onresult = (event) => {
      let interim = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) finalTranscript += transcript;
        else interim += transcript;
      }
      messageInput.value = (finalTranscript + " " + interim).trim();
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.style.background = "#0f766e";
      micBtn.textContent = "🎙️";
      if (messageInput.value.trim() !== "") {
        sendMessage(messageInput.value.trim());
      }
    };
    
    micBtn.addEventListener('click', () => {
      if (isRecording) recognition.stop();
      else recognition.start();
    });
  }

  init();
  setupSpeechRecognition();
</script>
</body>
</html>
