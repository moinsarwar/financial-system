apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: financial-system-ingress
  namespace: financial-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  rules:
  - http:
      paths:
      - path: /products
        pathType: Prefix
        backend:
          service:
            name: pil-service
            port:
              number: 8000
      - path: /sessions
        pathType: Prefix
        backend:
          service:
            name: journey-service
            port:
              number: 8004
      - path: /parse_intent
        pathType: Prefix
        backend:
          service:
            name: agent-service
            port:
              number: 8003
      - path: /execute_tools
        pathType: Prefix
        backend:
          service:
            name: agent-service
            port:
              number: 8002
      - path: /query_audit
        pathType: Prefix
        backend:
          service:
            name: audit-service
            port:
              number: 8007
      - path: /provider/ingest
        pathType: Prefix
        backend:
          service:
            name: pil-service
            port:
              number: 8000
      - path: /validate/product
        pathType: Prefix
        backend:
          service:
            name: pil-service
            port:
              number: 8000
      - path: /digital-asset-register
        pathType: Prefix
        backend:
          service:
            name: database-service
            port:
              number: 8000