apiVersion: v1
kind: Service
metadata:
  name: pil-service
  namespace: financial-system
spec:
  selector:
    app: pil-service
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pil-service
  namespace: financial-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pil-service
  template:
    metadata:
      labels:
        app: pil-service
    spec:
      containers:
      - name: pil-service
        image: financial-system/pil-service:5.2
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: redis://:redis123@redis:6379
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: financial-system-secrets
              key: postgres-password
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
