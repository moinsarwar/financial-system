apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: financial-system
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Static files and default
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Clean URL mappings
        location = /login {
            try_files /login.html =404;
        }
        
        location = /dashboard {
            try_files /layout/app.html =404;
        }
        
        location ~ ^/dashboard/product {
            try_files /layout/app.html =404;
        }
    }
