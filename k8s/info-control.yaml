apiVersion: v1
kind: Service
metadata:
  name: info-control
  namespace: financial-system
spec:
  selector:
    app: info-control
  ports:
  - port: 8005
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: info-control
  namespace: financial-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: info-control
  template:
    metadata:
      labels:
        app: info-control
    spec:
      containers:
      - name: info-control
        image: financial-system/info-control:5.2
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: redis://:redis123@redis:6379
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: financial-system-secrets
              key: postgres-password
        ports:
        - containerPort: 8000
