version: '3.8'  
  
services:  
  db:  
    image: postgres:15  
    container_name: comparison_db  
    environment:  
      POSTGRES_USER: comparison  
      POSTGRES_PASSWORD: comparison  
      POSTGRES_DB: comparison  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  
    ports:  
      - "5433:5432"  
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U comparison"]  
      interval: 10s  
      timeout: 5s  
      retries: 5  
  
  backend:  
    build: ./backend  
    container_name: comparison_backend  
    depends_on:  
      db:  
        condition: service_healthy  
    environment:  
      DATABASE_URL: postgresql://comparison:comparison@comparison_db/comparison  
      FINOS_API_URL: "http://finos-backend-1:8000/api"
    ports:  
      - "9005:8000"  
    volumes:  
      - ./backend:/app  # Mount for live code reload  
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  
  
    networks:
      - default
      - finos_net

  frontend:  
    build: ./frontend  
    container_name: comparison_frontend  
    depends_on:  
      - backend  
    ports:  
      - "9004:80"
    networks:
      - default

networks:
  default:
  finos_net:
    external: true
    name: finos_default

volumes:  
  postgres_data:
