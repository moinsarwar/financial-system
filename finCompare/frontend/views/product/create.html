<div class="container">
    <div class="header-action">
        <h2 class="title" id="form-title"><i class="fa-solid fa-plus-circle"></i> Add New Product</h2>
        <button type="button" class="add-btn" onclick="routeTo('/dashboard/product')"><i class="fa-solid fa-arrow-left"></i> Back to List</button>
    </div>

    <form id="productForm" onsubmit="submitProduct(event)">
        <input type="hidden" id="edit_product_id" value="">
        
        <div class="form-grid">
            <div class="form-group">
                <label>Provider ID</label>
                <input type="text" id="provider_id" required placeholder="e.g., UBL, Meezan">
            </div>
            <div class="form-group">
                <label>Product Type</label>
                <input list="product_types_list" id="product_type" required placeholder="Select or type new...">
                <datalist id="product_types_list">
                    <option value="account">Bank Account</option>
                    <option value="card">Credit Card</option>
                    <option value="loan">Loan</option>
                    <option value="insurance">Insurance</option>
                    <option value="Premium Saving">Premium Saving</option>
                </datalist>
            </div>
            <div class="form-group">
                <label>Schema Hash</label>
                <input type="text" id="schema_hash" required value="sha256:abc1234567890abcdef">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status" required>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="form-group">
                <label>Version</label>
                <input type="text" id="version" required value="1">
            </div>
            <div class="form-group">
                <label>Last Updated</label>
                <input type="datetime-local" id="last_updated" required>
            </div>
            <div class="form-group">
                <label>Min Age</label>
                <input type="number" id="minAge" placeholder="e.g. 18">
            </div>
            <div class="form-group">
                <label>Max Age</label>
                <input type="number" id="maxAge" placeholder="e.g. 65">
            </div>
            <div class="form-group">
                <label>Sharia Certified</label>
                <select id="sharia_certified">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jurisdiction</label>
                <input type="text" id="jurisdiction" required value='["PK"]' placeholder='["PK"]'>
            </div>
            <div class="form-group">
                <label>Effective Date</label>
                <input type="date" id="effective_date">
            </div>
            <div class="form-group">
                <label>Published By</label>
                <input type="text" id="published_by" value="System Admin">
            </div>
            <div class="form-group">
                <label>Approved By</label>
                <input type="text" id="approved_by" value="Compliance Team">
            </div>
            <div class="form-group">
                <label>Change Request</label>
                <input type="text" id="change_request" value="CR-1001">
            </div>
            <div class="form-group full-width">
                <label>Previous Version</label>
                <input type="text" id="previous_version" value="v0.9">
            </div>

            <div class="form-group full-width" id="pricing-container">
                <label>Pricing Items</label>
                <div class="dynamic-section">
                    <div id="pricing-rows">
                        <div class="row">
                            <input type="text" placeholder="Key (e.g. monthly_fee)" class="price-key">
                            <input type="text" placeholder="Value (e.g. 0)" class="price-value">
                            <button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <button type="button" onclick="addPricingRow()" class="add-btn"><i class="fa-solid fa-plus"></i> Add Pricing Item</button>
                </div>
            </div>

            <div class="form-group full-width" id="features-container">
                <label>Features List</label>
                <div class="dynamic-section">
                    <div id="features-rows">
                        <div class="row">
                            <input type="text" placeholder="Feature Name" class="feat-name">
                            <input type="text" placeholder="Feature Details" class="feat-details">
                            <button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <button type="button" onclick="addFeatureRow()" class="add-btn"><i class="fa-solid fa-plus"></i> Add Feature</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: right;">
            <button type="submit" class="submit-btn" id="submit-btn"><i class="fa-solid fa-save"></i> Ingest Product</button>
        </div>
    </form>
</div>
