<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCompare Dashboard</title>
    
    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        :root {
            --bg: #f3f6fa;
            --surface: #ffffff;
            --text: #0b1e33;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --primary: #0b1e33;
            --primary-hover: #1e293b;
            --gold: #d4a843;
            --gold-light: #e8d5a3;
            --gold-bg: rgba(212, 168, 67, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.1);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --radius-lg: 16px;
            --radius-md: 8px;
            --sidebar-width: 280px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header i {
            color: var(--gold);
            font-size: 1.8rem;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
        }

        .sidebar-header h2 span {
            color: var(--gold);
        }

        .nav-links {
            flex: 1;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.25rem;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .nav-link i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-link.active {
            background-color: var(--gold-bg);
            color: var(--gold);
            font-weight: 600;
        }

        .nav-link.logout {
            margin-top: auto;
            color: #fca5a5;
            background-color: rgba(239, 68, 68, 0.1);
        }
        .nav-link.logout:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: white;
        }
        
        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background-image: radial-gradient(circle at 100% 0%, rgba(212, 168, 67, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h2.title {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* ===== FORMS ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: #fafafa;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--gold-bg);
        }
        
        /* ===== BUTTONS ===== */
        .submit-btn {
            background-color: var(--primary);
            color: white;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(11, 30, 51, 0.15);
        }
        
        .add-btn {
            background-color: white;
            color: var(--primary);
            border: 2px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .add-btn:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }
        
        /* ===== DYNAMIC ROWS ===== */
        .dynamic-section {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border);
            margin-top: 0.5rem;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .row input {
            flex: 1;
        }
        
        .remove-btn {
            background-color: white;
            color: var(--red);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            width: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            border-color: var(--red);
            background-color: var(--red-bg);
        }
        
        /* ===== DATATABLES OVERRIDES ===== */
        table.dataTable {
            border-collapse: collapse !important;
            width: 100% !important;
            margin-top: 1.5rem !important;
            border-bottom: 1px solid var(--border) !important;
        }

        table.dataTable thead th {
            background: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1rem !important;
            border-bottom: 2px solid var(--border) !important;
        }

        table.dataTable tbody td {
            padding: 1rem !important;
            vertical-align: middle;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text);
        }

        table.dataTable tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .action-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            background: white;
            transition: all 0.2s;
        }

        .btn-edit {
            color: var(--primary);
        }
        .btn-edit:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .btn-delete {
            color: var(--red);
        }
        .btn-delete:hover {
            border-color: var(--red);
            background-color: var(--red-bg);
        }

        .status-pill {
            background: var(--green-bg);
            color: var(--green);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dataTables_wrapper .dataTables_filter input {
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
        }
        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .dataTables_wrapper .dataTables_length select {
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.4rem;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current, 
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
            background: var(--primary) !important;
            color: white !important;
            border: none !important;
            border-radius: var(--radius-md) !important;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            color: white;
            display: none;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-chart-pie"></i>
            <h2>Fin<span>Compare</span></h2>
        </div>
        <div class="nav-links">
            <a class="nav-link" id="nav-home" onclick="showView('home')">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>
            <a class="nav-link" id="nav-list" onclick="showView('list')">
                <i class="fa-solid fa-layer-group"></i> Product List
            </a>
            <a class="nav-link logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        <!-- HOME / SUMMARY VIEW -->
        <div id="view-home" class="container" style="display: none;">
            <div class="header-action">
                <h2 class="title"><i class="fa-solid fa-house"></i> Overview</h2>
            </div>
            <div class="form-grid">
                <div style="background: var(--surface); border: 1px solid var(--border); padding: 2rem; border-radius: var(--radius-lg); display: flex; align-items: center; gap: 1.5rem; box-shadow: var(--shadow-sm);">
                    <div style="background: var(--gold-bg); padding: 1.2rem; border-radius: 50%; color: var(--gold); font-size: 2rem;">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <div>
                        <h3 style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; margin-bottom: 0.2rem;">Total Products</h3>
                        <p id="total-products-count" style="font-size: 2.2rem; font-weight: 800; color: var(--text);">...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADD / EDIT VIEW -->
        <div id="view-add" class="container" style="display: none;">
            <div class="header-action">
                <h2 class="title" id="form-title"><i class="fa-solid fa-plus-circle"></i> Add New Product</h2>
                <button type="button" class="add-btn" onclick="showView('list')"><i class="fa-solid fa-arrow-left"></i> Back to List</button>
            </div>
            
            <form id="productForm" onsubmit="submitProduct(event)">
                <input type="hidden" id="edit_product_id" value="">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Provider ID</label>
                        <input type="text" id="provider_id" required placeholder="e.g., UBL, Meezan">
                    </div>
                    <div class="form-group">
                        <label>Product Type</label>
                        <input list="product_types_list" id="product_type" required placeholder="Select or type new...">
                        <datalist id="product_types_list">
                            <option value="account">Bank Account</option>
                            <option value="card">Credit Card</option>
                            <option value="loan">Loan</option>
                            <option value="insurance">Insurance</option>
                            <option value="Premium Saving">Premium Saving</option>
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label>Schema Hash</label>
                        <input type="text" id="schema_hash" required value="sha256:abc1234567890abcdef">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status" required>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Version</label>
                        <input type="text" id="version" required value="1">
                    </div>
                    <div class="form-group">
                        <label>Last Updated</label>
                        <input type="datetime-local" id="last_updated" required>
                    </div>
                    <div class="form-group">
                        <label>Min Age</label>
                        <input type="number" id="minAge" placeholder="e.g. 18">
                    </div>
                    <div class="form-group">
                        <label>Max Age</label>
                        <input type="number" id="maxAge" placeholder="e.g. 65">
                    </div>
                    <div class="form-group">
                        <label>Sharia Certified</label>
                        <select id="sharia_certified">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jurisdiction</label>
                        <input type="text" id="jurisdiction" required value='["PK"]' placeholder='["PK"]'>
                    </div>
                    <div class="form-group">
                        <label>Effective Date</label>
                        <input type="date" id="effective_date">
                    </div>
                    <div class="form-group">
                        <label>Published By</label>
                        <input type="text" id="published_by" value="System Admin">
                    </div>
                    <div class="form-group">
                        <label>Approved By</label>
                        <input type="text" id="approved_by" value="Compliance Team">
                    </div>
                    <div class="form-group">
                        <label>Change Request</label>
                        <input type="text" id="change_request" value="CR-1001">
                    </div>
                    <div class="form-group full-width">
                        <label>Previous Version</label>
                        <input type="text" id="previous_version" value="v0.9">
                    </div>

                    <div class="form-group full-width" id="pricing-container">
                        <label>Pricing Items</label>
                        <div class="dynamic-section">
                            <div id="pricing-rows">
                                <div class="row">
                                    <input type="text" placeholder="Key (e.g. monthly_fee)" class="price-key">
                                    <input type="text" placeholder="Value (e.g. 0)" class="price-value">
                                    <button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                            <button type="button" onclick="addPricingRow()" class="add-btn"><i class="fa-solid fa-plus"></i> Add Pricing Item</button>
                        </div>
                    </div>

                    <div class="form-group full-width" id="features-container">
                        <label>Features List</label>
                        <div class="dynamic-section">
                            <div id="features-rows">
                                <div class="row">
                                    <input type="text" placeholder="Feature Name" class="feat-name">
                                    <input type="text" placeholder="Feature Details" class="feat-details">
                                    <button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                            <button type="button" onclick="addFeatureRow()" class="add-btn"><i class="fa-solid fa-plus"></i> Add Feature</button>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; text-align: right;">
                    <button type="submit" class="submit-btn" id="submit-btn"><i class="fa-solid fa-save"></i> Ingest Product</button>
                </div>
            </form>
        </div>

        <!-- LIST VIEW -->
        <div id="view-list" class="container">
            <div class="header-action">
                <h2 class="title"><i class="fa-solid fa-list"></i> Product Registry</h2>
                <button class="submit-btn" onclick="showView('add')"><i class="fa-solid fa-plus"></i> Add Product</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table id="productsTable" class="display">
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Provider</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Last Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr><td colspan="6" style="text-align:center; padding: 2rem !important; color: #64748b;"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" style="display: none;">
        <i class="fa-solid fa-circle-info" id="toast-icon"></i>
        <span id="toast-msg"></span>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        if(localStorage.getItem('auth_token') !== 'logged_in_valid_token') {
            window.location.href = '/login';
        }

        document.getElementById('last_updated').value = new Date().toISOString().slice(0, 16);
        
        async function route() {
            const path = window.location.pathname;
            if (path.startsWith('/dashboard/product/edit/')) {
                const id = path.split('/').pop();
                await fetchProducts(); 
                editProduct(id, false);
            } else if (path === '/dashboard/product/new') {
                document.getElementById('productForm').reset();
                document.getElementById('edit_product_id').value = '';
                showView('add', false);
            } else if (path === '/dashboard/product') {
                showView('list', false);
            } else {
                showView('home', false);
            }
        }

        window.onpopstate = () => route();

        // Initial load
        route();

        function logout() {
            localStorage.removeItem('auth_token');
            window.location.href = '/login';
        }

        function showToast(msg, isError) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.textContent = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toastIcon.className = isError ? 'fa-solid fa-circle-exclamation' : 'fa-solid fa-circle-check';
            
            // Force reflow for animation
            toast.style.display = 'none';
            toast.offsetHeight;
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function showView(view, updateUrl = true) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-add').style.display = view === 'add' ? 'block' : 'none';
            document.getElementById('view-list').style.display = view === 'list' ? 'block' : 'none';
            
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(view === 'home') document.getElementById('nav-home').classList.add('active');
            if(view === 'list') document.getElementById('nav-list').classList.add('active');
            
            if(view === 'home') {
                if(updateUrl) history.pushState(null, '', '/dashboard');
                fetchProducts(true); // Fetch for count
            } else if(view === 'list') {
                if(updateUrl) history.pushState(null, '', '/dashboard/product');
                fetchProducts();
            } else if(view === 'add') {
                if(!document.getElementById('edit_product_id').value) {
                    document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle"></i> Add New Product';
                    document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-save"></i> Ingest Product';
                    if(updateUrl) history.pushState(null, '', '/dashboard/product/new');
                }
            }
        }

        function addPricingRow(key='', val='') {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<input type="text" placeholder="Key" class="price-key" value="${key}"><input type="text" placeholder="Value" class="price-value" value="${val}"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('pricing-rows').appendChild(row);
        }
        function addFeatureRow(name='', details='') {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `<input type="text" placeholder="Feature Name" class="feat-name" value="${name}"><input type="text" placeholder="Feature Details" class="feat-details" value="${details}"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('features-rows').appendChild(row);
        }
        function removeRow(btn) {
            btn.parentElement.remove();
        }

        async function fetchProducts(onlyCount = false) {
            try {
                const res = await fetch('/products');
                const data = await res.json();
                
                if(!data.products) data.products = [];
                window.productsData = data.products;
                
                // Update total count
                const countEl = document.getElementById('total-products-count');
                if(countEl) countEl.innerText = data.products.length;

                if (onlyCount) return; // Stop here if we only needed the count for home view
                
                if ($.fn.DataTable.isDataTable('#productsTable')) {
                    $('#productsTable').DataTable().destroy();
                }

                const tbody = document.getElementById('products-tbody');
                tbody.innerHTML = '';
                
                if(data.products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem !important; color:#64748b;">No products found in registry.</td></tr>';
                    return;
                }

                window.productsData = data.products; // save for edit
                
                data.products.forEach(p => {
                    const tr = document.createElement('tr');
                    const statusClass = p.status.toLowerCase() === 'active' ? 'status-pill' : 'status-pill" style="background:rgba(239, 68, 68, 0.1); color:#ef4444;';
                    
                    tr.innerHTML = `
                        <td><strong>${p.product_id}</strong></td>
                        <td>${p.provider_id}</td>
                        <td>${p.product_type}</td>
                        <td><span class="${statusClass}">${p.status}</span></td>
                        <td>${new Date(p.last_updated).toLocaleString()}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="editProduct('${p.product_id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="action-btn btn-delete" onclick="deleteProduct('${p.product_id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                
                $('#productsTable').DataTable({
                    "pageLength": 10,
                    "ordering": true,
                    "searching": true,
                    "responsive": true,
                    "language": {
                        "search": "<i class='fa-solid fa-search' style='color:#94a3b8; margin-right:4px;'></i> Search:"
                    }
                });
            } catch(e) {
                showToast("Failed to load products from server", true);
            }
        }

        function editProduct(productId, updateUrl = true) {
            const p = window.productsData.find(x => x.product_id === productId);
            if(!p) return;

            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Edit Product: ' + productId;
            document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-save"></i> Update Product';
            document.getElementById('edit_product_id').value = productId;

            document.getElementById('provider_id').value = p.provider_id || '';
            document.getElementById('product_type').value = p.product_type || '';
            document.getElementById('status').value = p.status || 'active';
            document.getElementById('version').value = p.version || '1';
            document.getElementById('schema_hash').value = p.schema_hash || 'sha256:abc1234567890abcdef';
            document.getElementById('jurisdiction').value = p.jurisdiction ? JSON.stringify(p.jurisdiction) : '["PK"]';
            if(p.last_updated) document.getElementById('last_updated').value = p.last_updated.slice(0, 16);
            if(p.compliance) document.getElementById('sharia_certified').value = p.compliance.sharia_certified ? "true" : "false";
            
            document.getElementById('minAge').value = p.eligibility_rules?.minAge || '';
            document.getElementById('maxAge').value = p.eligibility_rules?.maxAge || '';
            document.getElementById('effective_date').value = p.effective_date ? p.effective_date.substring(0, 10) : '';
            document.getElementById('published_by').value = p.published_by || 'System Admin';
            document.getElementById('approved_by').value = p.approved_by || 'Compliance Team';
            document.getElementById('change_request').value = p.change_request || 'CR-1001';
            document.getElementById('previous_version').value = p.previous_version || 'v0.9';

            document.getElementById('pricing-rows').innerHTML = '';
            if(p.pricing) {
                Object.entries(p.pricing).forEach(([k,v]) => addPricingRow(k, v));
            }
            if(document.getElementById('pricing-rows').children.length === 0) addPricingRow();

            document.getElementById('features-rows').innerHTML = '';
            if(p.features) {
                p.features.forEach(f => addFeatureRow(f.name, f.details));
            }
            if(document.getElementById('features-rows').children.length === 0) addFeatureRow();

            showView('add', false);
            if(updateUrl) history.pushState(null, '', '/dashboard/product/edit/' + productId);
        }

        async function deleteProduct(productId) {
            if(!confirm(`Are you sure you want to completely delete ${productId}?`)) return;
            try {
                const res = await fetch(`/products/${productId}`, { method: 'DELETE' });
                if(res.ok) {
                    showToast("Product deleted successfully", false);
                    fetchProducts();
                } else {
                    showToast("Failed to delete product", true);
                }
            } catch(e) {
                showToast("Network error during deletion", true);
            }
        }

        async function submitProduct(e) {
            e.preventDefault();
            
            let pricing = {};
            document.querySelectorAll('#pricing-rows .row').forEach(row => {
                const k = row.querySelector('.price-key').value.trim();
                const v = row.querySelector('.price-value').value.trim();
                if(k && v) {
                    pricing[k] = isNaN(v) ? v : Number(v);
                }
            });

            let features = [];
            document.querySelectorAll('#features-rows .row').forEach(row => {
                const n = row.querySelector('.feat-name').value.trim();
                const d = row.querySelector('.feat-details').value.trim();
                if(n || d) {
                    features.push({name: n, details: d});
                }
            });
            
            let jurisdiction = ["PK"];
            try {
                if(document.getElementById('jurisdiction').value.trim()) jurisdiction = JSON.parse(document.getElementById('jurisdiction').value);
            } catch(err) {
                showToast("Invalid JSON format in Jurisdiction!", true);
                return;
            }

            const productObj = {
                product_type: document.getElementById('product_type').value,
                jurisdiction: jurisdiction,
                status: document.getElementById('status').value,
                version: document.getElementById('version').value,
                last_updated: new Date(document.getElementById('last_updated').value).toISOString(),
                pricing: pricing,
                eligibility_rules: {
                    minAge: parseInt(document.getElementById('minAge').value) || 0,
                    maxAge: parseInt(document.getElementById('maxAge').value) || 99
                },
                features: features,
                compliance: {"sharia_certified": document.getElementById('sharia_certified').value === 'true'},
                effective_date: document.getElementById('effective_date').value || undefined,
                published_by: document.getElementById('published_by').value || undefined,
                approved_by: document.getElementById('approved_by').value || undefined,
                change_request: document.getElementById('change_request').value || undefined,
                previous_version: document.getElementById('previous_version').value || undefined
            };

            const editId = document.getElementById('edit_product_id').value;
            if(editId) {
                productObj.product_id = editId;
            }

            const payload = {
                provider_id: document.getElementById('provider_id').value,
                schema_hash: document.getElementById('schema_hash').value,
                products: [productObj]
            };

            const submitBtn = document.getElementById('submit-btn');
            const originalHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            try {
                const res = await fetch('/provider/ingest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(res.ok) {
                    showToast(editId ? "Product updated successfully!" : "Product successfully ingested!", false);
                    document.getElementById('productForm').reset();
                    document.getElementById('edit_product_id').value = '';
                    document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus-circle"></i> Add New Product';
                    document.getElementById('submit-btn').innerHTML = '<i class="fa-solid fa-save"></i> Ingest Product';
                    document.getElementById('jurisdiction').value = '["PK"]';
                    document.getElementById('pricing-rows').innerHTML = '<div class="row"><input type="text" placeholder="Key" class="price-key"><input type="text" placeholder="Value" class="price-value"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></div>';
                    document.getElementById('features-rows').innerHTML = '<div class="row"><input type="text" placeholder="Feature Name" class="feat-name"><input type="text" placeholder="Feature Details" class="feat-details"><button type="button" class="remove-btn" title="Remove" onclick="removeRow(this)"><i class="fa-solid fa-trash"></i></button></div>';
                    showView('list');
                } else {
                    const errText = await res.text();
                    showToast("Failed to process product: " + errText, true);
                }
            } catch(err) {
                showToast("Network error occurred.", true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalHtml;
            }
        }
    </script>
</body>
</html>
