apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: financial-system
spec:
  selector:
    app: agent-service
  ports:
  - port: 8003
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: financial-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
      - name: agent-service
        image: financial-system/agent-service:5.2
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: redis://:redis123@redis:6379
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: financial-system-secrets
              key: postgres-password
        ports:
        - containerPort: 8000
