apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  namespace: financial-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
  template:
    metadata:
      labels:
        app: frontend-service
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: frontend-html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: financial-system
spec:
  selector:
    app: frontend-service
  ports:
  - port: 80
    targetPort: 80
