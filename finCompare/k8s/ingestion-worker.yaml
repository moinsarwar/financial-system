apiVersion: v1
kind: Service
metadata:
  name: ingestion-worker
  namespace: financial-system
spec:
  selector:
    app: ingestion-worker
  ports:
  - port: 8008
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: financial-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-worker
  template:
    metadata:
      labels:
        app: ingestion-worker
    spec:
      containers:
      - name: ingestion-worker
        image: financial-system/ingestion-worker:5.2
        imagePullPolicy: IfNotPresent
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: financial-system-secrets
              key: postgres-password
        ports:
        - containerPort: 8000
