apiVersion: v1
kind: Service
metadata:
  name: policy-service
  namespace: fincompare
spec:
  selector:
    app: policy-service
  ports:
  - port: 8002
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-service
  namespace: fincompare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-service
  template:
    metadata:
      labels:
        app: policy-service
    spec:
      containers:
      - name: policy-service
        image: financial-system/policy-service:5.2
        imagePullPolicy: IfNotPresent
        env:
        - name: REDIS_URL
          value: redis://:redis123@redis:6379
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: POSTGRES_HOST
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fincompare-secrets
              key: postgres-password
        - name: MODE_CONTROL_URL
          value: http://mode-control:8004
        ports:
        - containerPort: 8000
